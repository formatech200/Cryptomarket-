<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Market</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f7fa;
}

header {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 25px;
}

.logos img {
    width: 45px;
    margin: 5px;
    background: white;
    padding: 4px;
    border-radius: 6px;
}

main {
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    text-align: center;
    color: #ff6f00;
}

label {
    margin-top: 10px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    display: block;
    margin: 20px auto;
    padding: 12px;
    background: #ff6f00;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 5px;
}

button:hover {
    background: #e65100;
}

.info {
    background: #fff3e0;
    padding: 10px;
    border-left: 5px solid #ff6f00;
    margin-bottom: 15px;
}

footer {
    background: #c62828;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Crypto Market</h1>
    <p>Transfert rapide USDT - MonCash - NatCash</p>

    <div class="logos">
        <img src="Natcash PNG.jpeg">
        <img src="https://cryptologos.cc/logos/tether-usdt-logo.png?v=016">
        <img src="Digicel.jpg">
    </div>
</header>

<main>

<h2>Formulaire de demande</h2>

<div class="info">
Taux : <strong>1 USDT = ≤ 138 HTG</strong><br>
Réception en 15 à 30 minutes après confirmation.
</div>

<form id="form" action="https://formsubmit.co/formatech200@gmail.com" method="POST">

<label>Nom complet :</label>
<input type="text" name="Nom" required>

<label>Méthode de réception :</label>
<select id="paiement" name="Paiement" required onchange="toggleChamps()">
    <option value="">--Choisir--</option>
    <option value="wallet">Wallet USDT</option>
    <option value="moncash">MonCash</option>
    <option value="natcash">NatCash</option>
</select>

<div id="champ-wallet" style="display:none;">
    <label>Adresse Wallet :</label>
    <input type="text" id="wallet" name="wallet">

    <label>Montant (USDT) :</label>
    <input type="number" id="montant-usdt" name="montant_usdt">
</div>

<div id="champ-numero" style="display:none;">
    <label>Numéro :</label>
    <input type="text" id="numero" name="numero">

    <label>Montant (HTG) :</label>
    <input type="number" id="montant-htg" name="montant_htg">
</div>

<label>Message :</label>
<textarea name="Message"></textarea>

<input type="hidden" name="_next" value="https://formatech200.github.io/">

<button type="button" onclick="envoyerTout()">🚀 Envoyer la demande</button>

</form>

</main>

<footer>
Contact :
<a href="https://wa.me/50943750836" target="_blank">WhatsApp</a> |
<a href="mailto:formatech200@gmail.com">Email</a>
</footer>

<script>

// AFFICHAGE DYNAMIQUE
function toggleChamps() {
    let paiement = document.getElementById("paiement").value;

    document.getElementById("champ-wallet").style.display = (paiement === "wallet") ? "block" : "none";
    document.getElementById("champ-numero").style.display = (paiement === "moncash" || paiement === "natcash") ? "block" : "none";
}

// ENVOI
function envoyerTout() {

    let nom = document.querySelector('[name="Nom"]').value;
    let paiement = document.getElementById('paiement').value;

    let texte = `Nouvelle demande :
Nom : ${nom}
Méthode : ${paiement}`;

    if (paiement === "wallet") {
        let wallet = document.getElementById('wallet').value;
        let montant = document.getElementById('montant-usdt').value;

        texte += `\nWallet : ${wallet}\nMontant : ${montant} USDT`;
    } 
    else {
        let numero = document.getElementById('numero').value;
        let montant = document.getElementById('montant-htg').value;

        texte += `\nNuméro : ${numero}\nMontant : ${montant} HTG`;
    }

    // EMAIL
    document.getElementById("form").submit();

    // WHATSAPP
    let numeroWA = "50943750836";
    let lien = `https://wa.me/${numeroWA}?text=${encodeURIComponent(texte)}`;

    window.open(lien, "_blank");
}

</script>

</body>
</html>
