<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Market - USDT - MonCash - NatCash</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
}
header {
    background-color: #1e1e2f;
    color: white;
    padding: 20px;
    text-align: center;
}
main {
    padding: 20px;
    max-width: 600px;
    margin: auto;
    background: white;
    border-radius: 10px;
}
label {
    margin-top: 10px;
    display: block;
}
input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
}
button {
    margin-top: 20px;
    padding: 12px;
    background: #1e1e2f;
    color: white;
    border: none;
    cursor: pointer;
}
button:hover {
    background: #333;
}
.info {
    background: #fffae6;
    padding: 10px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Crypto Market</h1>
    <p>Transfert rapide USDT - MonCash - NatCash</p>
</header>

<main>

<h2>Formulaire de demande USDT</h2>

<div class="info">
Taux fixe : <strong>1 USDT = ≤ 138 HTG</strong><br>
Réception en 15 à 30 minutes après confirmation.
</div>

<form action="https://formsubmit.co/formatech200@gmail.com" method="POST" target="_blank">

<label>Nom complet :</label>
<input type="text" name="Nom" required>

<label>Montant (USDT) :</label>
<input type="number" id="montant" name="Montant" required>

<label>Méthode de réception :</label>
<select id="paiement" name="Paiement" required>
    <option value="">--Choisir--</option>
    <option value="wallet">Adresse Wallet USDT</option>
    <option value="moncash">MonCash</option>
    <option value="natcash">NatCash</option>
</select>

<!-- Wallet -->
<div id="champ-wallet" style="display:none;">
    <label>Adresse Wallet :</label>
    <input type="text" id="wallet" name="wallet">
</div>

<!-- Numéro -->
<div id="champ-numero" style="display:none;">
    <label>Numéro :</label>
    <input type="text" id="numero" name="numero">
</div>

<label>WhatsApp :</label>
<input type="text" id="whatsapp" placeholder="509XXXXXXXX" required>

<label>Message :</label>
<textarea id="message"></textarea>

<input type="hidden" name="_next" value="https://formatech200.github.io/">

<button type="submit">Envoyer par Email</button>

</form>

<button onclick="envoyerWhatsApp()">Envoyer sur WhatsApp</button>

</main>

<script>
// Afficher champs selon choix
document.getElementById("paiement").addEventListener("change", function() {
    let choix = this.value;

    document.getElementById("champ-wallet").style.display = "none";
    document.getElementById("champ-numero").style.display = "none";

    if (choix === "wallet") {
        document.getElementById("champ-wallet").style.display = "block";
    } else if (choix === "moncash" || choix === "natcash") {
        document.getElementById("champ-numero").style.display = "block";
    }
});

// WhatsApp
function envoyerWhatsApp() {
    let nom = document.querySelector('[name="Nom"]').value;
    let montant = document.getElementById('montant').value;
    let paiement = document.getElementById('paiement').value;
    let numero = document.getElementById('whatsapp').value.replace(/\D/g,'');

    let wallet = "";
    let numero_dest = "";

    if(paiement === "wallet"){
        wallet = document.getElementById('wallet').value;
    } else {
        numero_dest = document.getElementById('numero').value;
    }

    if(!numero || numero.length < 8){
        alert("Numéro WhatsApp invalide");
        return;
    }

    let texte = `Nouvelle demande USDT :
Nom : ${nom}
Montant : ${montant} USDT
Paiement : ${paiement}`;

    if(wallet) texte += `\nWallet : ${wallet}`;
    if(numero_dest) texte += `\nNuméro : ${numero_dest}`;

    let lien = `https://wa.me/${numero}?text=${encodeURIComponent(texte)}`;
    window.open(lien, '_blank');
}
</script>

</body>
</html>
