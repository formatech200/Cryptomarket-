<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Market</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f7fa;
}

/* HEADER BLEU */
header {
    background: #0d47a1;
    color: white;
    text-align: center;
    padding: 20px;
}

/* MAIN */
main {
    max-width: 600px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

/* TITRES ORANGE */
h2 {
    color: #ff6f00;
}

/* FORM */
label {
    margin-top: 10px;
    display: block;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BOUTON CENTRÉ ORANGE */
button {
    display: block;
    margin: 20px auto;
    padding: 12px;
    background: #ff6f00;
    color: white;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    background: #e65100;
}

/* INFO */
.info {
    background: #fff3e0;
    padding: 10px;
    border-left: 5px solid #ff6f00;
    margin-bottom: 15px;
}

/* FOOTER ROUGE */
footer {
    background: #c62828;
    color: white;
    text-align: center;
    padding: 15px;
}

footer a {
    color: #ffccbc;
    text-decoration: none;
}
</style>
</head>

<body>

<header>
    <h1>Crypto Market</h1>
    <p>Transfert rapide USDT - MonCash - NatCash</p>
</header>

<main>

<h2>Formulaire de demande</h2>

<div class="info">
Taux : <strong>1 USDT = ≤ 138 HTG</strong><br>
Réception en 15 à 30 minutes.
</div>

<form action="https://formsubmit.co/formatech200@gmail.com" method="POST">

<label>Nom complet :</label>
<input type="text" name="Nom" required>

<label>Méthode de réception :</label>
<select id="paiement" name="Paiement" required>
    <option value="">--Choisir--</option>
    <option value="wallet">Wallet USDT</option>
    <option value="moncash">MonCash</option>
    <option value="natcash">NatCash</option>
</select>

<!-- WALLET -->
<div id="champ-wallet" style="display:none;">
    <label>Adresse Wallet :</label>
    <input type="text" id="wallet" name="wallet">

    <label>Montant (USDT) :</label>
    <input type="number" id="montant-usdt" name="montant_usdt">
</div>

<!-- MONCASH / NATCASH -->
<div id="champ-numero" style="display:none;">
    <label>Numéro :</label>
    <input type="text" id="numero" name="numero">

    <label>Montant (HTG) :</label>
    <input type="number" id="montant-htg" name="montant_htg">
</div>

<label>WhatsApp :</label>
<input type="text" id="whatsapp" name="WhatsApp" placeholder="509XXXXXXXX" required>

<label>Message :</label>
<textarea id="message" name="Message"></textarea>

<input type="hidden" name="_next" value="https://formatech200.github.io/">

<!-- BOUTON UNIQUE -->
<button type="submit" onclick="envoyerWhatsApp()">
🚀 Envoyer la demande
</button>

</form>

</main>

<footer>
Contact :
<a href="https://wa.me/50943750836" target="_blank">WhatsApp</a> |
<a href="mailto:formatech200@gmail.com">Email</a>
</footer>

<script>
// AFFICHAGE CHAMPS
document.getElementById("paiement").addEventListener("change", function() {

    let choix = this.value;

    document.getElementById("champ-wallet").style.display = "none";
    document.getElementById("champ-numero").style.display = "none";

    if (choix === "wallet") {
        document.getElementById("champ-wallet").style.display = "block";
    } else if (choix === "moncash" || choix === "natcash") {
        document.getElementById("champ-numero").style.display = "block";
    }
});

// ENVOI WHATSAPP + EMAIL
function envoyerWhatsApp() {

    let nom = document.querySelector('[name="Nom"]').value;
    let paiement = document.getElementById('paiement').value;
    let numeroWA = document.getElementById('whatsapp').value.replace(/\D/g,'');

    let texte = `Nouvelle demande :
Nom : ${nom}
Méthode : ${paiement}`;

    if(paiement === "wallet"){
        let wallet = document.getElementById('wallet').value;
        let montant = document.getElementById('montant-usdt').value;

        texte += `\nWallet : ${wallet}\nMontant : ${montant} USDT`;
    } else {
        let numero = document.getElementById('numero').value;
        let montant = document.getElementById('montant-htg').value;

        texte += `\nNuméro : ${numero}\nMontant : ${montant} HTG`;
    }

    let lien = `https://wa.me/${numeroWA}?text=${encodeURIComponent(texte)}`;

    // Ouvre WhatsApp
    window.open(lien, '_blank');

    // Email sera envoyé automatiquement par le formulaire
}
</script>

</body>
</html>
